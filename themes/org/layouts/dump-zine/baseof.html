<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ printf "%s | %s" .Title site.Title }}</title>
  <meta name="description" content="{{ .Params.Description }}" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/media/images/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/media/images/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/media/images/favicon/favicon.ico" />

  <!-- Tailwind CSS (exclusive for DUMP Zine — no Bootstrap loaded) -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#a3e635",
            "background-light": "#000000",
            "background-dark": "#000000",
          },
          fontFamily: {
            display: ['"Courier New"', 'Courier', 'monospace'],
          },
        },
      },
    };
  </script>
  <style>
    body {
      background-color: #000;
      color: #a3e635;
      font-family: 'Courier New', Courier, monospace;
      overflow-x: hidden;
    }

    .glitch-noise {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 50;
      opacity: 0.05;
      background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
    }

    .ascii-art {
      white-space: pre;
      text-align: center;
      line-height: 1.1;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
    }

    .nav-link {
      transition: all 0.2s;
    }

    .nav-link:hover {
      color: #fff;
      text-shadow: 0 0 5px #a3e635;
    }

    .article-list {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 0.5rem;
    }

    .article-title {
      flex-shrink: 0;
    }

    .article-dots {
      flex-grow: 1;
      border-bottom: 1px dotted #a3e635;
      margin: 0 10px;
      position: relative;
      top: -4px;
      opacity: 0.5;
    }

    .article-type {
      flex-shrink: 0;
    }

    .article-link:hover .article-title,
    .article-link:hover .article-type {
      color: #fff;
      text-shadow: 0 0 5px #a3e635;
    }
  </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-primary font-display min-h-screen relative p-4 md:p-8">
  <div class="glitch-noise"></div>
  {{ block "main" . }}{{ end }}
</body>

</html>
